# ─────────────────────────────────────────────────────────────────
#  EKS Cleanup  –  runs every 30 min, stops via CLEANUP_DONE flag
# ─────────────────────────────────────────────────────────────────
# How it works:
#   • Runs every 30 min via cron schedule.
#   • FIRST checks the repo variable CLEANUP_DONE:
#     - If "true"  → skip everything, workflow exits immediately.
#     - If "false" → run the cleanup script.
#   • After successful deletion, sets CLEANUP_DONE = "true"
#     so all future cron runs become instant no-ops.
#
# Setup (one-time):
#   1. Go to repo Settings → Secrets and variables → Actions → Variables tab
#   2. Create variable:  CLEANUP_DONE = false
#   3. Create secrets:   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   4. Push this workflow. It will auto-run every 30 min.
#   5. To re-enable cleanup later, just set CLEANUP_DONE back to "false".
# ─────────────────────────────────────────────────────────────────

name: EKS Cleanup

on:
  schedule:
    - cron: "*/30 * * * *"        # every 30 minutes
  workflow_dispatch:               # also allow manual trigger

env:
  CLUSTER_NAME: eksdemo
  AWS_REGION: us-east-1

permissions:
  contents: read
  actions: write                   # needed to update repo variable

jobs:
  cleanup:
    runs-on: ubuntu-latest

    # ── Gate: skip if cleanup already done ──
    if: vars.CLEANUP_DONE != 'true'

    steps:
      - name: Log start
        run: |
          echo "🔄 CLEANUP_DONE = '${{ vars.CLEANUP_DONE }}' → running cleanup"
          echo "   Cluster: $CLUSTER_NAME | Region: $AWS_REGION"
          echo "   Time: $(date -u '+%Y-%m-%d %H:%M UTC')"

      # ── 1. Checkout code ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── 3. Install dependencies ──
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Install kubectl ──
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # ── 5. Configure AWS credentials ──
      # - name: Configure AWS credentials
      #   uses: aws-actions/configure-aws-credentials@v4
      #   with:
      #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      #     aws-region: ${{ env.AWS_REGION }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::703671929703:role/Github-action-role
          role-session-name: samplerolesession
          aws-region: us-east-1

      # ── 6. Run cleanup script ──
      - name: Run EKS cleanup
        id: cleanup
        run: |
          set +e
          python main.py --cluster-name "$CLUSTER_NAME" --region "$AWS_REGION"
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"

          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=DELETED" >> "$GITHUB_OUTPUT"
            echo "✅ Cluster deleted successfully!"
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "result=NOT_FOUND" >> "$GITHUB_OUTPUT"
            echo "ℹ️  Cluster not found – already gone."
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "result=IN_USE" >> "$GITHUB_OUTPUT"
            echo "⏳ Cluster still in use – will retry in next 30-min run."
          else
            echo "result=ERROR" >> "$GITHUB_OUTPUT"
            echo "❌ Unexpected error (exit $EXIT_CODE)."
          fi
          exit 0   # always succeed so the flag-update step runs

      # ── 7. Set CLEANUP_DONE = true (stop future runs) ──
      - name: Set CLEANUP_DONE flag to true
        if: steps.cleanup.outputs.result == 'DELETED' || steps.cleanup.outputs.result == 'NOT_FOUND'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            const result = "${{ steps.cleanup.outputs.result }}";
            console.log(`Cleanup result: ${result}`);
            console.log("Setting CLEANUP_DONE = true to stop future runs…");

            try {
              await github.rest.actions.updateRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "CLEANUP_DONE",
                value: "true",
              });
              console.log("✅ CLEANUP_DONE set to 'true'. Future cron runs will be skipped.");
            } catch (error) {
              // Variable might not exist yet — create it
              console.log("Variable not found, creating it…");
              await github.rest.actions.createRepoVariable({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: "CLEANUP_DONE",
                value: "true",
              });
              console.log("✅ CLEANUP_DONE created and set to 'true'.");
            }

      # ── 8. Summary ──
      - name: Job summary
        if: always()
        run: |
          RESULT="${{ steps.cleanup.outputs.result }}"
          echo "## EKS Cleanup Result" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Cluster | \`$CLUSTER_NAME\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Region | \`$AWS_REGION\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Result | **$RESULT** |" >> "$GITHUB_STEP_SUMMARY"
          echo "| CLEANUP_DONE flag | \`${{ vars.CLEANUP_DONE }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$RESULT" = "DELETED" ]; then
            echo "✅ **Cluster deleted. CLEANUP_DONE set to true. No more runs.**" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$RESULT" = "NOT_FOUND" ]; then
            echo "ℹ️ **Cluster already gone. CLEANUP_DONE set to true. No more runs.**" >> "$GITHUB_STEP_SUMMARY"
          elif [ "$RESULT" = "IN_USE" ]; then
            echo "⏳ **Cluster in use. Will retry in next 30-min cron run.**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "❌ **Error. Will retry in next 30-min cron run.**" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Job that runs when flag is already true (just logs & exits) ──
  already-done:
    runs-on: ubuntu-latest
    if: vars.CLEANUP_DONE == 'true'
    steps:
      - name: Cleanup already completed
        run: |
          echo "🟢 CLEANUP_DONE = 'true' → nothing to do."
          echo "   To re-enable, set the repo variable CLEANUP_DONE to 'false'."
          echo "## Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "CLEANUP_DONE is \`true\`. Cleanup already completed. No action taken." >> "$GITHUB_STEP_SUMMARY"
